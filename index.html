<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Después de la Tormenta llega la Calma</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --tormenta-bg: #1a252f;
            --tormenta-text: #ffffff;
            --calma-bg: #fcfaf2;
            --calma-text: #4a4a4a;
            --accent: #fbc02d;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            transition: background-color 2.5s ease;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- ESTADO TORMENTA --- */
        .estado-tormenta {
            background-color: var(--tormenta-bg);
            color: var(--tormenta-text);
        }

        .rayo-box {
            font-size: 70px;
            filter: drop-shadow(0 0 10px var(--accent));
            animation: vibrar 0.2s infinite alternate;
            margin-bottom: 10px;
        }

        @keyframes vibrar {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        textarea {
            width: 90%;
            max-width: 450px;
            height: 180px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--accent);
            border-radius: 20px;
            color: white;
            padding: 20px;
            font-size: 1rem;
            outline: none;
            margin-bottom: 25px;
            backdrop-filter: blur(5px);
        }

        .btn-tormenta {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* --- ESTADO CALMA --- */
        .estado-calma {
            background-color: var(--calma-bg);
            color: var(--calma-text);
        }

        .calma-view {
            display: none;
            max-width: 500px;
            animation: aparecer 3s ease-out;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .oracion {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            line-height: 1.8;
            font-style: italic;
            margin: 30px 0;
            color: #5d4037;
        }

        .vibras-logo {
            margin-top: 50px;
            font-weight: 300;
            letter-spacing: 4px;
            color: #bcaaa4;
            font-size: 0.8rem;
        }

        .hidden { display: none; }
    </style>
</head>
