<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Después de la Tormenta</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            text-align: center;
            transition: 2s;
        }
        /* ESTADO TORMENTA */
        .tormenta { background: #1a252f; color: white; }
        /* ESTADO CALMA */
        .calma { background: #fcfaf2; color: #4a4a4a; }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        textarea {
            width: 100%;
            max-width: 400px;
            height: 150px;
            margin: 20px 0;
            border-radius: 10px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            border: none;
            background: #fbc02d;
            color: black;
        }

        .hidden { display: none; }
        .vibras { margin-top: 30px; font-weight: bold; color: #bcaaa4; }
    </style>
</head>
<body id="cuerpo" class="tormenta">

    <div class="container" id="pantalla-tormenta">
        <div style="font-size: 60px;">⚡</div>
        <h1>La Tormenta</h1>
        <p>Escribe lo que quieres soltar:</p>
        <textarea id="texto-tormenta" placeholder="Escribe aquí..."></textarea>
        <br>
        <button onclick="cambiarACalma()">SOLTAR A LA TORMENTA</button>
    </div>

    <div class="container hidden" id="pantalla-calma">
        <div style="font-size: 80px;">☀️</div>
        <h1>Llegó la Calma</h1>
        <p style="font-style: italic; font-size: 20px; max-width: 500px;">
            "Señor, entregamos esta tormenta. Que tu paz guarde nuestro corazón y nuestra unión. Amén."
        </p>
        <button onclick="location.reload()" style="background: #eee;">Reiniciar</button>
        <div class="vibras">✨ VIBRAS POSITIVAS ✨</div>
    </div>

    <script>
        function cambiarACalma() {
            // 1. Ocultar la tormenta
            document.getElementById('pantalla-tormenta').style.display = 'none';
            
            // 2. Cambiar el color del fondo
            document.getElementById('cuerpo').classList.remove('tormenta');
            document.getElementById('cuerpo').classList.add('calma');
            
            // 3. Mostrar la calma
            document.getElementById('pantalla-calma').classList.remove('hidden');
            
            // 4. Borrar lo escrito (Privacidad)
            document.getElementById('texto-tormenta').value = "";
        }
    </script>
</body>
</html>
